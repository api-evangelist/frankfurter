aid: frankfurter
name: Frankfurter
description: >-
  Frankfurter is an open-source (MIT) currency exchange rates API that blends foreign-exchange reference rates published
  by 50+ central banks and monetary authorities. It hosts a free, no-key public endpoint at api.frankfurter.dev (current
  v2 and frozen v1) and ships as a Docker image for unlimited self-hosting. Historical data extends back to 1948 and
  covers 201 currencies; the API serves JSON, NDJSON, and CSV.
url: https://frankfurter.dev
specificationVersion: '0.20'
created: '2026-05-28'
modified: '2026-05-29'
